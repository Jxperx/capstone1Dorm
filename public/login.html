<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EliteStay</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="videos/Video_3.mov" type="video/mp4">
        Your browser does not support the video tag.    
    </video>

    <a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-3 rounded-0" style="z-index: 1000; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-width: 2px;">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>

<div class="auth-card reverse">
    <div class="auth-image">
        <div class="auth-overlay">
            <h2 class="display-5 mb-3" style="font-family: 'Playfair Display', serif;">Welcome Back</h2>
            <p class="lead fw-light">Experience premium student living at its finest.</p>
        </div>
    </div>
    <div class="auth-form">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; color: var(--primary);">Tenant Portal</h3>
            <p class="text-muted small">Please sign in to continue</p>
        </div>
        
        <form action="/api/login" method="POST">
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0 rounded-0 ps-0" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 rounded-0 ps-0" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input rounded-0" type="checkbox" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none" style="color: var(--accent);">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 rounded-0 text-uppercase fw-bold" style="letter-spacing: 1px;">Log In</button>
        </form>

        <!-- OTP Verification Form (Hidden by default) -->
        <form id="otp-form" class="d-none">
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Verification Code</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-key text-muted"></i></span>
                    <input type="text" name="otp" class="form-control border-start-0 rounded-0 ps-0" placeholder="Enter 6-digit code" maxlength="6" required>
                </div>
                <div class="form-text text-center mt-2 fst-italic">Check your email for the verification code.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3 rounded-0 text-uppercase fw-bold" style="letter-spacing: 1px;">Verify Login</button>
            <button type="button" id="back-to-login" class="btn btn-outline-secondary w-100 btn-sm rounded-0">Back to Login</button>
        </form>
    </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
