<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EliteStay</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="videos/hero-bg.mov" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-3 rounded-0" style="z-index: 1000; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-width: 2px;">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>

<div class="auth-card">
    <div class="auth-image">
        <div class="auth-overlay">
            <h2 class="display-5 mb-3" style="font-family: 'Playfair Display', serif;">Welcome Home</h2>
            <p class="lead fw-light">Join our community and experience premium living.</p>
            <a href="/login" class="btn btn-outline-light rounded-0 px-4 mt-3 text-uppercase fw-bold" style="letter-spacing: 1px;">Log In</a>
        </div>
    </div>
    <div class="auth-form">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; color: var(--primary);">Create Account</h3>
            <p class="text-muted small">Sign up to manage your stay</p>
        </div>
        
        <form action="/api/register" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="fullName" class="form-control border-start-0 rounded-0 ps-0" placeholder="John Doe" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0 rounded-0 ps-0" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px;">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 rounded-0 ps-0" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-light rounded-start-3"><i class="fas fa-phone text-muted"></i></span>
                    <input type="tel" name="phone" class="form-control" placeholder="+1 234 567 8900">
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 rounded-0 text-uppercase fw-bold" style="letter-spacing: 1px;">Sign Up</button>
        </form>
    </div>
</div>

<script src="js/register.js"></script>

</body>
</html>
